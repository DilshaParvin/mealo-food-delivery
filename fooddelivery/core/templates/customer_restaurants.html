<!DOCTYPE html>
<html>
<head>
    <title>Restaurants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fff5f5;
        }
        .card {
            border-radius: 16px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.02);
        }
        .btn-view {
            background-color: #ff6b6b;
            color: white;
            border-radius: 20px;
        }
        .btn-view:hover {
            background-color: #ff9f1c;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4" style="color:#ff6b6b;">🍽️ Available Restaurants</h2>

    <div class="row">
        {% for r in restaurants %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm p-3">
                <h4>{{ r.name }}</h4>
                <p class="text-muted">{{ r.address }}</p>
                <a href="{% url 'restaurant_menu' r.id %}" class="btn btn-view w-100">
                    View Menu
                </a>
            </div>
        </div>
        {% empty %}
        <p class="text-center">No restaurants available.</p>
        {% endfor %}
    </div>
</div>

</body>
</html>
