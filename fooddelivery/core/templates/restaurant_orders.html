<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#fff5f5; }
        .card { border-radius:12px; }
        .status { font-weight:bold; color:#ff5722; }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4" style="color:#ff5722;">📦 Orders</h2>

    {% for order in orders %}
    <div class="card p-3 mb-4">

        <h5>Order #{{ order.id }}</h5>
        <p><strong>Customer:</strong> {{ order.user.username }}</p>
        <p><strong>Total:</strong> ₹ {{ order.total_price }}</p>
        <p class="status">Status: {{ order.status }}</p>

        <hr>

        <div>
            <a href="{% url 'update_order_status' order.id 'Preparing' %}" 
               class="btn btn-warning btn-sm">Preparing</a>

            <a href="{% url 'update_order_status' order.id 'Delivered' %}" 
               class="btn btn-success btn-sm">Delivered</a>
        </div>

    </div>
    {% empty %}
    <p class="text-center">No orders yet</p>
    {% endfor %}

</div>

</body>
</html>
