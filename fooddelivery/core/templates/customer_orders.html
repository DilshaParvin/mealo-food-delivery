<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#fff5f5; }
        .card { border-radius:12px; }
        .status {
            font-weight:bold;
            padding:5px 10px;
            border-radius:10px;
        }
        .pending { background:#ffe082; }
        .preparing { background:#ffb74d; }
        .delivered { background:#81c784; }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4" style="color:#ff5722;">📦 My Orders</h2>

    {% for order in orders %}
    <div class="card p-3 mb-4">

        <h5>Order #{{ order.id }}</h5>
        <p><strong>Restaurant:</strong> {{ order.restaurant.name }}</p>
        <p><strong>Total:</strong> ₹ {{ order.total_price }}</p>

        <p>
            <strong>Status:</strong>
            <span class="status 
                {% if order.status == 'Pending' %}pending
                {% elif order.status == 'Preparing' %}preparing
                {% elif order.status == 'Delivered' %}delivered
                {% endif %}">
                {{ order.status }}
            </span>
        </p>

    </div>
    {% empty %}
    <p class="text-center">No orders yet</p>
    {% endfor %}

</div>

</body>
</html>
