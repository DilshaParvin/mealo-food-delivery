{% extends 'base.html' %}

{% block content %}

<div style="display: flex; justify-content: flex-start; padding-left: 80px;">

    <div class="card" style="width: 450px;margin: auto;">

        <h2 style="text-align:center; margin-bottom: 20px;">
            ➕ Add Food Item
        </h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {% if form.errors %}
                <div style="color: red; margin-bottom: 10px;">
                    {{ form.errors }}
                </div>
            {% endif %}

            <label>Food Name</label>
            {{ form.name }}

            <label>Description</label>
            {{ form.description }}

            <label>Price</label>
            {{ form.price }}

            <label>Category</label>
            {{ form.category }}

            <label>Food Image</label>
            {{ form.image }}

            <button class="btn" type="submit" style="width: 100%; margin-top: 10px;">
                Add Food
            </button>
        </form>

    </div>

</div>

{% endblock %}
