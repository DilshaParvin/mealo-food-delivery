<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* VIDEO BACKGROUND */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* DARK OVERLAY */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LOGIN CARD */
        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .card h3 {
            color: #ff5722;
            font-weight: bold;
        }

        /* BUTTON */
        .btn-theme {
            background: #ff7043;
            color: white;
            border-radius: 25px;
            font-weight: 500;
        }

        .btn-theme:hover {
            background: #e64a19;
        }

        /* LINKS */
        a {
            text-decoration: none;
            color: #ff5722;
        }

        a:hover {
            text-decoration: underline;
        }

        /* INPUT */
        .form-control {
            border-radius: 20px;
        }
        .btn-outline-secondary {
            border-radius: 0 20px 20px 0;
            background: white;
            border: 1px solid #ced4da;
            border-left: none;
        }
    </style>
</head>
<body>

<!-- VIDEO -->
<video autoplay muted loop class="video-bg">
    <source src="/static/videos/food.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div class="overlay">

    <div class="card text-center">

        <h3 class="mb-4">Welcome Back 👋</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" class="form-control mb-3" required>
            <div class="input-group mb-3">
                <input type="password" name="password" id="password" placeholder="Password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()"><i class="bi bi-eye"></i></button>
            </div>
            <button type="submit" class="btn btn-theme w-100">Login</button>
        </form>

        <p class="mt-3">
            Don't have an account?
            <a href="{% url 'register' %}">Sign up</a>
        </p>

    </div>

</div>
<script>
    function togglePassword(){
        const pass = document.getElementById("password");
        pass.type = pass.type === "password" ? "text": "password";
    }
</script>

</body>
</html>
