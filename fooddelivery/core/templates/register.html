<!DOCTYPE html>
<html>
  <head>
    <title>registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
      body{
        margin: 0;
        height: 100vh;
        font-family: Arial, sans-serif;
      }
      .video-bg{
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }

      .overlay{
        background: rgba(0, 0, 0, 0.6);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card{
        background: rgba(255, 255, 255, 0.92);
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      }

      .card h3 {
        color: #ff5722;
        font-weight: bold;
      }

        /* INPUT */
      .form-control {
        border-radius: 20px;
      }

        /* BUTTON */
      .btn-theme {
        background: #ff7043;
        color: white;
        border-radius: 25px;
        font-weight: 500;
      }

      .btn-theme:hover {
        background: #e64a19;
      }

        /* LINKS */
      a {
        text-decoration: none;
        color: #ff5722;
      }

      a:hover {
        text-decoration: underline;
      }
      .btn-outline-secondary {
        border-radius: 0 20px 20px 0;
        background: white;
        border: 1px solid #ced4da;
        border-left: none;
      }

      

    </style>
  </head>
  <body>
    <video autoplay muted loop class="video-bg">
      <source src="/static/videos/food.mp4" type="video/mp4">
    </video>
    <div class="overlay">
      <div class="card text-center">
        <h3 class="mb-4">Create Account ✨</h3>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
          {%csrf_token%}
          <input type="text" name="username" placeholder="Username" class="form-control" mb-2 required>
          <input type="email" name="email" placeholder="Email" class="form-control" mb-2 required>
          <div class="input-group">
              <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
              <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()"><i class="bi bi-eye"></i></button>
          </div>
          <select name="role" class="form-control mb-3">
            <option value="customer">Customer</option>
            <option value="restaurant">Restaurant</option>
          </select>
          <button type="submit" class="btn btn-theme w-100">Register</button>
        </form>
        <p class="mt-3">Already have an account?
          <a href="{% url 'login' %}">Login</a>
        </p>

      </div>
    </div> 
    <script>
      function togglePassword() {
          const pass = document.getElementById("password");
          pass.type = pass.type === "password" ? "text" : "password";
      }
      </script>
  </body>
</html>
